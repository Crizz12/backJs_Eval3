name: Deploy User Service to ECS

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout código
        uses: actions/checkout@v3

      - name: Configurar credenciales AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      - name: Login a Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Build, tag y push imagen a ECR
        run: |
          docker build -t user-service:latest .
          docker tag user-service:latest 816010020366.dkr.ecr.us-east-1.amazonaws.com/user-service:latest
          docker push 816010020366.dkr.ecr.us-east-1.amazonaws.com/user-service:latest

      - name: Deploy a ECS
        run: |
          aws ecs update-service --cluster eval3-cluster --service user-service-svc --force-new-deployment --region us-east-1
